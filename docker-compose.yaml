# nginx proxy address - http://172.17.0.1:8102

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "5m"
    max-file: "1"

services:
  phpipam:
    image: phpipam/phpipam-www:latest
    container_name: phpipam-app
    restart: unless-stopped
    logging: *default-logging
    networks:
      - phpipam
    ports:
      - "8102:80"
    environment:
      TZ: ${TZ:-America/New_York}
    volumes:
      - ./rootfs/data/phpipam:/data
      - ./rootfs/config/phpipam:/config
    depends_on:
      - phpipam-db

  phpipam-db:
    image: mariadb:11
    container_name: phpipam-db
    restart: unless-stopped
    logging: *default-logging
    networks:
      - phpipam
    environment:
      TZ: ${TZ:-America/New_York}
      MARIADB_DATABASE: ${DB_CREATE_DATABASE_NAME:-phpipam}
      MARIADB_USER: ${DB_USER_NAME:-phpipam}
      MARIADB_PASSWORD: ${DB_USER_PASS:-changeme_db_password}
      MARIADB_ROOT_PASSWORD: ${DB_ADMIN_PASS:-changeme_root_password}
    volumes:
      - ./rootfs/db/mariadb/phpipam:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  phpipam:
    external: false
